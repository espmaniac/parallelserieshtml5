<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParallelSeries | Resistor, Capacitor, and Inductor Equivalent Calculator</title>
    <meta name="keywords" content="ParallelSeries, equivalent resistance, equivalent capacitance, equivalent inductance, delta star transform, parallel connection, series connection, resistance calculator, capacitance calculator, inductance calculator, resistor network solver, capacitor network solver, inductor network solver">
    <meta name="description" content="ParallelSeries is an interactive circuit calculator that finds equivalent resistor, capacitor, and inductor values in series and parallel networks.">
    <meta property="og:title" content="ParallelSeries | Equivalent R, C, and L Calculator">
    <meta property="og:description" content="Draw networks and calculate equivalent resistance, capacitance, and inductance values with ParallelSeries.">
    <meta property="og:url" content="https://espmaniac.github.io/parallelserieshtml5/">
    <meta property="og:site_name" content="ParallelSeries">
    <link rel="canonical" href="https://espmaniac.github.io/parallelserieshtml5/">
    <link rel="icon" href="logo/favicon.svg" sizes="any" type="image/svg+xml">
    <link rel="shortcut icon" href="logo/favicon16x16.ico" type="image/x-icon">
    <link rel="shortcut icon" href="logo/favicon32x32.ico" type="image/x-icon">
    <link rel="shortcut icon" href="logo/favicon96x96.ico" type="image/x-icon">
    <link rel="shortcut icon" href="logo/favicon180x180.ico" type="image/x-icon">
    <link rel="shortcut icon" href="logo/favicon512x512.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <div id="chooseComponent">
        <div id="alignContent">
        <div class="chooseComponentContent">
            <div class="chooseComponentTop">
                <div class="chooseComponentBrand">
                    <span class="brandBadge" aria-hidden="true">Parallel / Series</span>
                    <h1>Select a Component</h1>
                    <p class="chooseComponentHint">ParallelSeries is an interactive calculator for equivalent resistor, capacitor, and inductor values. Choose the default component type for your workspace.</p>
                </div>
            </div>
            <div id="components">
                <button id="resistor" class="componentCard" aria-label="Select resistor">
                    <span class="componentIcon" aria-hidden="true"></span>
                    <span class="componentName">Resistor</span>
                    <span class="componentShortcut">R</span>
                </button>
                <button id="capacitor" class="componentCard" aria-label="Select capacitor">
                    <span class="componentIcon" aria-hidden="true"></span>
                    <span class="componentName">Capacitor</span>
                    <span class="componentShortcut">C</span>
                </button>
                <button id="inductor" class="componentCard" aria-label="Select inductor">
                    <span class="componentIcon" aria-hidden="true"></span>
                    <span class="componentName">Inductor</span>
                    <span class="componentShortcut">L</span>
                </button>
            </div>
            <div class="form chooseComponentOpenScheme">
                <textarea class="chooseComponentTextarea" id="openScheme" cols="1" rows="1" placeholder="json"></textarea>
                <button id="open">Open</button>
            </div>
            </div>
            <a class="chooseComponentGitHub" href="https://github.com/espmaniac/parallelserieshtml5" target="_blank" rel="noopener noreferrer" aria-label="View ParallelSeries on GitHub">
                <img src="icons/github.svg" alt="" aria-hidden="true">
                <span>View on GitHub</span>
            </a>

        </div>
    </div>
    
    <div id="header">
        <input type="checkbox" id="menuToggle" aria-label="Toggle menu">
        <label for="menuToggle" id="menuToggleLabel">☰ Menu</label>

        <div id="left">
            <!--<button id="open">Open</button>-->
            <button id="save">Save</button>
            <button id="equivalent">Equivalent</button>
            <button id="calculate">Parallel/Series</button>
        </div>

        <a href="https://github.com/espmaniac/parallelserieshtml5" target="_blank" rel="noopener noreferrer"><img src="icons/github.png" alt="github" id="github"></a>

        <div id="right">
            <button id="clear">Clear</button>
        </div>        
    </div>

    <div id="scheme">
        <div id="tools">
            <div id="mainTools">
              <button id="cursorTool" class="active">
                  <img src="icons/cursor.svg" alt="" width="40" height="20">
              </button>
              <button id="wireTool">
                  <img src="icons/wire.svg" alt="" width="40" height="20">
              </button>

            </div>
        </div>

        <canvas id="myCanvas"></canvas>

    </div>

    <div id="expression">
        <label for="inp">Parallel / Series expression</label>
        <div class="form">
            <textarea class="textarea" id="inp" cols="1" rows="1"></textarea>
            <button id="calc" type="button"> = </button>
        </div>
        <div id="answer">
            <h2 id="result">Answer: 42</h2>
        </div>
    </div>

    <div class="modal" id="saveModal">
        <div class="modalDialog">
            <div class="modalHeader">
                <h3>Save</h3>
                <button class="close" type="button">x</button>
            </div>
            <div class="modalContent">
            
                <div id="saveScheme" class="form">
                    <textarea class="textarea" id="saveText" cols="1" rows="12" readonly></textarea>
                    <button id="saveFileBtn" type="button">copy</button>
                </div>
            </div>
        
        </div>
    </div>


    <div id="contextMenu">
        <ul id="ctxUL"></ul>
    </div>
    
    <script src="scripts/parallelseries.js" defer></script>
    
    
    <script src="scripts/main.js" defer></script>
    <script src="scripts/text.js" defer></script>
    <script src="scripts/labelnode.js" defer></script>
    <script src="scripts/scheme.js" defer></script>
    
    <script src="scripts/tool_manager.js" defer></script>
    <script src="scripts/context_menu.js" defer></script>
    <script src="scripts/connector.js" defer></script>
    <script src="scripts/command.js" defer></script>
    
    <script src="scripts/component.js" defer></script>
    <script src="scripts/junction.js" defer></script>
    <script src="scripts/node.js" defer></script>
    
    <script src="scripts/wire.js" defer></script>

    <script src="scripts/equivalent.js" defer></script>

    <script src="scripts/graph.js" defer></script>
</body>
</html>
